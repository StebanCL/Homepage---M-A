<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/registrarse.css">
    <link rel="icon" type="image" href="../img/logo.jpeg">
</head>
<body>
    <div class="registro-container">
        <div class="registro-card">

            <img src="../img/logo.jpeg" alt="Logo M&A Barber Shop" class="logo-registro">

            <h1>Registrarse</h1>

            <p class="subtitulo">
                Crea tu cuenta para agendar y gestionar tus citas.
            </p>

            <form id="registro-form">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="nombre" 
                            placeholder="Ingresa tu nombre"
                        >
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="apellido" class="form-label">Apellido</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="apellido" 
                            placeholder="Ingresa tu apellido"
                        >
                    </div>

                </div>

                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha de nacimiento</label>
                    <input 
                        type="date" 
                        class="form-control" 
                        id="fecha"
                    >
                </div>

                <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="correo" 
                        placeholder="ejemplo@correo.com"
                    >
                </div>

                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input 
                        type="tel" 
                        class="form-control" 
                        id="telefono" 
                        placeholder="Ingresa tu número de teléfono"
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="Crea una contraseña"
                    >
                </div>

                <div class="mb-4">
                    <label for="confirmar-password" class="form-label">Confirmar contraseña</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="confirmar-password" 
                        placeholder="Confirma tu contraseña"
                    >
                </div>

                <button type="submit" class="btn-registro">
                    Registrarse
                </button>

            </form>

            <a href="../index.html" class="volver">
                ← Volver a inicio
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/script.js"></script>
    
</body>
</html>
