<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/iniciarsesion.css">
    <link rel="icon" type="image" href="/img/logo.jpeg">
</head>
<body>
    <div class="login-container">

        <div class="login-card">

            <img src="/img/logo.jpeg" alt="Logo M&A Barber Shop" class="logo-login">

            <h1>Iniciar Sesión</h1>

            <p class="subtitulo">
                Accede a tu cuenta para gestionar tus citas.
            </p>

            <form>

                <div class="mb-3">
                    <label for="usuario" class="form-label">
                        Usuario o Número de Teléfono
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="usuario"
                        placeholder="Ingresa tu usuario o teléfono"
                    >
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                    >
                </div>

                <button type="submit" class="btn-login">
                    Iniciar
                </button>

            </form>

            <a href="/index.html" class="volver">
                ← Volver a inicio
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
